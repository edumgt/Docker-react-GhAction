services:
  # ── MariaDB ──────────────────────────────────────────────────────
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: canvasdb
      MYSQL_USER: canvasuser
      MYSQL_PASSWORD: canvaspass
    command: --max-allowed-packet=64M
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  # ── Ollama (LLaVA vision model for AI sketch enhancement) ────────
  # First-time setup: docker compose exec ollama ollama pull llava
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── App (Node.js + Vite build) ────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: canvasuser
      DB_PASSWORD: canvaspass
      DB_NAME: canvasdb
      JWT_SECRET: "${JWT_SECRET:-change-this-secret-in-production-use-a-long-random-string}"
      OLLAMA_URL: "http://ollama:11434"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/app/storage

volumes:
  db_data:
  ollama_data:
  storage_data:
